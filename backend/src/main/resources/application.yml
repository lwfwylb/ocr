server:
  port: 8889

spring:
  application:
    name: intelligent-extraction-backend
  profiles:
    active: mysql
  jackson:
    default-property-inclusion: non_null
    time-zone: Asia/Shanghai
    deserialization:
      fail-on-unknown-properties: false
  servlet:
    multipart:
      max-file-size: 100MB
      max-request-size: 120MB

mybatis:
  mapper-locations: classpath*:mapper/**/*.xml
  configuration:
    map-underscore-to-camel-case: true

app:
  cors:
    allowed-origins:
      - http://127.0.0.1:5170
      - http://localhost:5170
  storage:
    upload-dir: data/uploads
